services:
  rustfs:
    container_name: dakwah-rustfs
    image: rustfs/rustfs:latest
    ports:
      - "127.0.0.1:9100:9000"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-dakwah}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:?Set RUSTFS_SECRET_KEY}
    volumes:
      - dakwah-rustfs-data:/data
    networks:
      - dakwah-net
    restart: unless-stopped

volumes:
  dakwah-rustfs-data:
    name: dakwah-rustfs-data

networks:
  dakwah-net:
    external: true
