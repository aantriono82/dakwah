services:
  api:
    container_name: dakwah-api
    build:
      context: ../..
      dockerfile: Dockerfile.api
    image: ${API_IMAGE:-ghcr.io/aantriono82/dakwah-api:latest}
    ports:
      - "127.0.0.1:3200:3000"
    networks:
      - dakwah-net
    environment:
      NODE_ENV: production
      SERVE_FRONTEND: "false"
      PORT: 3000
      DATABASE_URL: /app/data/dakwah.sqlite
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://dakwah.aantriono.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://dakwah.aantriono.com}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-Lax}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-30}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      GENERATE_RATE_LIMIT_WINDOW_MS: ${GENERATE_RATE_LIMIT_WINDOW_MS:-60000}
      GENERATE_RATE_LIMIT_MAX: ${GENERATE_RATE_LIMIT_MAX:-6}
      DEFAULT_DAILY_GENERATE_LIMIT: ${DEFAULT_DAILY_GENERATE_LIMIT:-50}
      MYQURAN_ENABLED: ${MYQURAN_ENABLED:-true}
      MYQURAN_API_BASE_URL: ${MYQURAN_API_BASE_URL:-https://api.myquran.com/v3}
      MYQURAN_TIMEOUT_MS: ${MYQURAN_TIMEOUT_MS:-2500}
      MYQURAN_CACHE_TTL_SECONDS: ${MYQURAN_CACHE_TTL_SECONDS:-2592000}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_MODELS: ${OPENAI_MODELS:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-5500}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-30000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_MODELS: ${GEMINI_MODELS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Dakwah <noreply@aantriono.com>}
      RESET_PASSWORD_DEBUG_LINK: ${RESET_PASSWORD_DEBUG_LINK:-false}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?Set SEED_ADMIN_PASSWORD}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:?Set SEED_USER_PASSWORD}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://dakwah-rustfs:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-dakwah}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:-dakwah}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-https://dakwah-storage.aantriono.com/dakwah}
      S3_SIGNED_URL_EXPIRES: ${S3_SIGNED_URL_EXPIRES:-604800}
      S3_REQUIRED: ${S3_REQUIRED:-true}
    volumes:
      - dakwah-sqlite-data:/app/data
    restart: unless-stopped

volumes:
  dakwah-sqlite-data:
    name: dakwah-sqlite-data

networks:
  dakwah-net:
    external: true
