services:
  app:
    build: .
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: 3000
      DATABASE_URL: /app/data/dakwah.sqlite
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-Lax}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-30}
      GENERATE_RATE_LIMIT_WINDOW_MS: ${GENERATE_RATE_LIMIT_WINDOW_MS:-60000}
      GENERATE_RATE_LIMIT_MAX: ${GENERATE_RATE_LIMIT_MAX:-6}
      DEFAULT_DAILY_GENERATE_LIMIT: ${DEFAULT_DAILY_GENERATE_LIMIT:-50}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_MODELS: ${OPENAI_MODELS:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-5500}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-30000}
      OPENAI_WEB_SEARCH_ENABLED: ${OPENAI_WEB_SEARCH_ENABLED:-false}
      OPENAI_WEB_SEARCH_CONTEXT_SIZE: ${OPENAI_WEB_SEARCH_CONTEXT_SIZE:-medium}
      WEB_RESEARCH_ENABLED: ${WEB_RESEARCH_ENABLED:-true}
      WEB_RESEARCH_SEARCH_ENABLED: ${WEB_RESEARCH_SEARCH_ENABLED:-true}
      WEB_RESEARCH_MAX_RESULTS: ${WEB_RESEARCH_MAX_RESULTS:-4}
      WEB_RESEARCH_TIMEOUT_MS: ${WEB_RESEARCH_TIMEOUT_MS:-7000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_MODELS: ${GEMINI_MODELS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: "${EMAIL_FROM:-Dakwah <onboarding@resend.dev>}"
      RESET_PASSWORD_DEBUG_LINK: "false"
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-user123}
      S3_ENDPOINT: http://rustfs:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: dakwah
      S3_SECRET_ACCESS_KEY: dakwah-secret
      S3_BUCKET: dakwah
      S3_PUBLIC_URL: http://localhost:9000/dakwah
      S3_REQUIRED: "true"
    volumes:
      - app-data:/app/data
    depends_on:
      - rustfs
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"
    environment:
      RUSTFS_ACCESS_KEY: dakwah
      RUSTFS_SECRET_KEY: dakwah-secret
    volumes:
      - rustfs-data:/data
    restart: unless-stopped

volumes:
  app-data:
  rustfs-data:
